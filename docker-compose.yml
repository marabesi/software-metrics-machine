services:
  sonarqube:
    image: sonarqube:10-community
    ports:
      - '9000:9000'
    volumes:
      - ./docker/sonar_data:/opt/sonarqube/data
      - ./docker/sonar_extensions:/opt/sonarqube/extensions
      - ./docker/sonar_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://sonarqube:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  api:
    image: node:25-slim
    working_dir: /workspace
    environment:
      PORT: 8000
      SMM_STORE_DATA_AT: /workspace/.data
      NODE_ENV: development
      PNPM_HOME: /pnpm
    ports:
      - '8000:8000'
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @smmachine/rest dev"

  webapp:
    image: node:25-slim
    working_dir: /workspace
    environment:
      PORT: 3000
      NODE_ENV: development
      PNPM_HOME: /pnpm
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @smmachine/webapp dev -- -H 0.0.0.0"

networks:
  default:
    driver: bridge

volumes:
  pnpm-store: