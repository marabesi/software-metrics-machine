services:
  sonarqube:
    image: sonarqube:10-community
    ports:
      - '9000:9000'
    volumes:
      - ./docker/sonar_data:/opt/sonarqube/data
      - ./docker/sonar_extensions:/opt/sonarqube/extensions
      - ./docker/sonar_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://sonarqube:9000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  api:
    build:
      context: apps/rest/
      dockerfile: Dockerfile.dev
    platform: linux/amd64
    environment:
      - SMM_STORE_DATA_AT=./data
      - PORT=8000
    ports:
      - '8000:8000'
    volumes:
      - ./apps/rest:/app
      - ./apps/rest/downloads/marabesi:/marabesi
      - ./apps/rest/downloads/marabesi_analysis:/data
    command: pnpm run dev

  webapp:
    build:
      context: apps/webapp/
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/webapp:/app
    command: npm run dev -- -H 0.0.0.0

networks:
  default:
    driver: bridge