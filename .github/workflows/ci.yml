name: CI

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"

jobs:
  build-typescript:
    name: Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Environment Variables
        uses: tw3lveparsecs/github-actions-setvars@v0.2
        with:
          envFilePath: ./envvars.for.actions

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set env variables
        run: cp apps/webapp/.env.local.example apps/webapp/.env

      - name: Set project example
        uses: actions/checkout@v6
        with:
          repository: react/react
          path: docs/project-example/react
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 500
          persist-credentials: false

      - name: Install dependencies
        run: pnpm install

      - name: Check architecture boundaries
        run: pnpm run lint:arch

      - name: Build workspace
        env:
          SMM_STORE_DATA_AT: /home/runner/work/software-metrics-machine/software-metrics-machine/docs/project-example
        run: pnpm run build
  
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Environment Variables
        uses: tw3lveparsecs/github-actions-setvars@v0.2
        with:
          envFilePath: ./envvars.for.actions

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test

  check-distribution:
    name: Check Distribution
    runs-on: ubuntu-latest
    needs: [build-typescript, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Environment Variables
        uses: tw3lveparsecs/github-actions-setvars@v0.2
        with:
          envFilePath: ./envvars.for.actions

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Set env variables
        run: cp apps/webapp/.env.local.example apps/webapp/.env

      - name: Set project example
        uses: actions/checkout@v6
        with:
          repository: react/react
          path: tmp/react
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 500
          persist-credentials: false

      - name: Check package distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SMM_STORE_DATA_AT: /home/runner/work/software-metrics-machine/software-metrics-machine/docs/project-example
        run: ./scripts/simulate-and-test-publish.sh true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
